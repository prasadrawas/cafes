<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafes Collection</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0d0b08; color: #f0ebe4; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; padding: 2rem; }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; color: #c8956c; }
        p { color: #9a928a; margin-bottom: 2rem; }
        a { display: inline-block; padding: 1rem 2.5rem; background: #c8956c; color: #0d0b08; text-decoration: none; border-radius: 100px; font-weight: 600; letter-spacing: 0.05em; transition: all 0.3s ease; }
        a:hover { background: #dbb08a; transform: translateY(-2px); box-shadow: 0 8px 30px rgba(200,149,108,0.3); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cafes</h1>
        <p>A collection of beautiful cafe websites</p>
        <a href="./cheri-cafe-n-eatery/">Chéri Cafe & Eatery</a>
    </div>
</body>
</html>
